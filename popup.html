<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Note</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="success-message" id="success-message">
    <i class="fas fa-check-circle"></i> <span id="success-text">Notes Copied Successfully</span>
  </div>
  
  <header>
    <h1><i class="fas fa-bolt" style="color: #6366f1;"></i> Quick Note</h1>
    <div class="header-actions">
      <button id="darkModeToggle" class="icon-btn" title="Toggle Dark Mode"><i class="fas fa-moon"></i></button>
      <button id="zenModeButton" class="icon-btn" title="Zen Mode"><i class="fas fa-expand"></i></button>
    </div>
  </header>

  <div class="content">
    <div class="input-container">
      <textarea id="noteInput" placeholder="What's on your mind? (Markdown supported)"></textarea>
    </div>
    
    <div class="action-buttons">
      <button class="btn btn-primary" id="saveButton">
        <i class="fas fa-save"></i> Save Note
      </button>
      <button class="btn btn-secondary" id="capturePageButton">
        <i class="fas fa-paperclip"></i> Add Page
      </button>
    </div>
  </div>
  
  <div class="show-task">
    <div class="section-header">
      <div class="section-title">Recent Notes</div>
      <div class="list-actions">
        <button id="copyAllButton" class="icon-btn" title="Copy All"><i class="fas fa-copy"></i></button>
        <button id="exportButton" class="icon-btn" title="Export to .txt"><i class="fas fa-download"></i></button>
      </div>
    </div>
    <div class="search-container">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="Search notes...">
    </div>
    <div class="show-content" id="notesList"></div>
  </div>

  <div class="edit-modal" id="editModal">
    <div class="edit-overlay" id="editOverlay"></div>
    <div class="edit-modal-content">
      <div class="edit-modal-header">
        <h2>Edit Note</h2>
        <button class="close-btn" id="closeEditModal"><i class="fas fa-times"></i></button>
      </div>
      <textarea id="editNoteInput" placeholder="Edit your note..."></textarea>
      <div class="edit-modal-actions">
        <button class="btn btn-secondary" id="cancelEditButton">Cancel</button>
        <button class="btn btn-primary" id="saveEditButton">Save</button>
      </div>
    </div>
  </div>

  <script src="./popup.js"></script>
</body>
</html>
